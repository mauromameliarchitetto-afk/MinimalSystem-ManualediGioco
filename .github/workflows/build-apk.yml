name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build:www

      - name: Stamp app version
        run: echo "const APP_VERSION = '1.0.${{ github.run_number }}';" > www/js/version.js

      - name: Create OTA bundle
        run: |
          cd www
          zip -qr ../bundle.zip .

      - name: Add Android platform
        run: npx cap add android

      - name: Generate icons and splash screens
        run: >
          npx @capacitor/assets generate --android
          --iconBackgroundColor '#14161A' --iconBackgroundColorDark '#14161A'
          --splashBackgroundColor '#14161A' --splashBackgroundColorDark '#14161A'

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Set version from run number
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Align and sign APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BT/zipalign" -p 4 android/app/build/outputs/apk/release/app-release-unsigned.apk MinimalSystem-aligned.apk
          "$BT/apksigner" sign --ks release.keystore --ks-pass pass:minimalsystem2026 --key-pass pass:minimalsystem2026 --out MinimalSystem.apk MinimalSystem-aligned.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: Minimal System APK v1.0.${{ github.run_number }}
          body: |
            APK nativo della Companion App di Minimal System, generato automaticamente.

            **Prima installazione**: scarica `MinimalSystem.apk` sul telefono, toccalo e conferma
            (la prima volta Android chiede di abilitare "Installa app sconosciute").

            **Aggiornamenti**: dalla v1.0.27 l'app si aggiorna da sola in background
            (scarica `bundle.zip` internamente e lo applica subito) — non serve più
            scaricare l'APK, che resta qui solo per le nuove installazioni.
          files: |
            MinimalSystem.apk
            bundle.zip
